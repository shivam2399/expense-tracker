<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>
<body>
    <div class="dashboard">

  <header class="dashboard-header">
  <div>
    <p class="eyebrow">Dashboard</p>
    <h1>Expense Tracker</h1>
  </div>

  <div class="header-actions" style="display: flex; gap: 12px; align-items: center;">
    <button id="leaderboardBtn" class="leaderboard-btn" style="display: none;">
      Show Leaderboard
    </button>
    <button id="renderBtn" class="premium-btn">
      Buy Premium
    </button>
  </div>
</header>

<div id="cf_checkout"></div>

  <form id="expense-form">

    <div class="field">
      <label for="amount">Amount</label>
      <input
        type="number"
        id="amount"
        placeholder="0.00"
        min="0"
        step="0.01"
      />
    </div>

    <div class="field field-wide">
      <label for="description">Description</label>
      <input
        type="text"
        id="description"
        placeholder="What did you spend on?"
      />
    </div>

    <div class="field">
      <label for="category">Category</label>
      <select id="category">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Others">Others</option>
      </select>
    </div>

    <button type="submit">
      Add Expense
    </button>

  </form>

  

  <div id="expense-list"></div>

  <div id="leaderboard-section" class="leaderboard-section" style="display: none;">
      <h2>👑 Leaderboard</h2>
      <div class="leaderboard-header-row">
          <span>Rank</span>
          <span>Name</span>
          <span>Total Expense</span>
      </div>
      <div id="leaderboard-list"></div>
  </div>

</div>

<script src="../js/dashboard.js"></script>
<script src="../public/cashFreeWeb_self.js"></script>
</body>
</html>
