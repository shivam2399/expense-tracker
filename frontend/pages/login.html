<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/global.css">
</head>
<body>

<div class="right-section">

    <div class="auth-card">

  <form class="login-form">

    <h1>Welcome Back</h1>

    <input
      type="email"
      id="email"
      placeholder="Enter Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button type="submit">
      Login
    </button>

    <p class="auth-link">
      New user?
      <a href="./signup.html">Create Account</a>
    </p>
    <p class="auth-link">
      <a href="#" id="forgotPasswordLink">Forgot Password?</a>
    </p>

  </form>

  </div>

</div>

<!-- Modal container for forgot password -->
<div id="forgotPasswordModal" class="modal" style="display: none;">
  <div class="modal-content auth-card">
    <div style="text-align: right;">
      <span class="close-btn" id="closeModal" style="cursor: pointer; font-size: 1.5rem; font-weight: bold; color: var(--text-light);">&times;</span>
    </div>
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email to receive a reset link</p>
    <form id="forgotPasswordForm">
      <input type="email" id="forgotEmail" placeholder="Enter Email" required style="width: 100%; min-height: 44px; padding: 0 12px; margin-bottom: 16px; border: 1px solid var(--border-color); border-radius: 8px; outline: none;">
      <button type="submit" style="width: 100%; min-height: 44px; border: 0; border-radius: 8px; background: var(--primary-color); color: white; font-weight: 700; cursor: pointer;">Send Reset Link</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
